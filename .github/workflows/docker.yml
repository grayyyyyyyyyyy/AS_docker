cat > ~/tasks/.github/workflows/docker.yml << 'EOF'
name: docker

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t kubsu-app ./docker
      - name: Save image
        run: docker save kubsu-app -o kubsu-app.tar
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: kubsu-app.tar

  test:
    runs-on: ubuntu-latest
    needs: [ build ]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: kubsu
          POSTGRES_USER: kubsu
          POSTGRES_PASSWORD: kubsu
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load and test
        run: |
          docker load -i kubsu-app.tar
          docker run --rm --network host \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=kubsu \
            -e DB_USER=kubsu \
            -e DB_PASS=kubsu \
            kubsu-app pytest tests

  deploy:
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 212.192.134.135
          port: 58529
          username: turing
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: kubsu-app.tar
          target: /tmp/
      - name: Run container on server
        uses: appleboy/ssh-action@v1
        with:
          host: 212.192.134.135
          port: 58529
          username: turing
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            podman load -i /tmp/kubsu-app.tar
            podman stop kubsu-app || true
            podman rm kubsu-app || true
            podman run -d --name kubsu-app --network host -e DB_HOST=127.0.0.1 -e DB_PORT=5432 -e DB_NAME=kubsu -e DB_USER=kubsu -e DB_PASS=kubsu -p 8114:8114 kubsu-app

  verify:
    runs-on: ubuntu-latest
    needs: [ deploy ]
    steps:
      - name: Verify
        run: |
          sleep 5
          curl -f http://212.192.134.135:60080/turing/users/ || exit 1
EOF